<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>People</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">

    <div class="bg-blue-600 text-white p-4">
        <h1 class="text-xl font-bold">💰 Expense Tracker</h1>
    </div>

    <div class="bg-white shadow-sm flex overflow-x-auto">
        <a href="index.html" class="px-4 py-3 text-gray-600 text-sm whitespace-nowrap">Dashboard</a>
        <a href="expenses.html" class="px-4 py-3 text-gray-600 text-sm whitespace-nowrap">Expenses</a>
        <a href="people.html" class="px-4 py-3 text-blue-600 border-b-2 border-blue-600 font-medium text-sm whitespace-nowrap">People</a>
        <a href="budget.html" class="px-4 py-3 text-gray-600 text-sm whitespace-nowrap">Budget</a>
        <a href="month-end.html" class="px-4 py-3 text-gray-600 text-sm whitespace-nowrap">Month End</a>
    </div>

    <div class="p-4 space-y-4">

        <!-- Add Person -->
        <div class="bg-white rounded-xl shadow p-4">
            <h2 class="font-bold text-gray-700 mb-3">Add Person</h2>
            <div class="space-y-3">
                <input id="name" type="text" placeholder="Name"
                    class="w-full border border-gray-300 rounded-lg p-3 text-sm focus:outline-none focus:border-blue-500">
                <input id="email" type="email" placeholder="Email"
                    class="w-full border border-gray-300 rounded-lg p-3 text-sm focus:outline-none focus:border-blue-500">
                <button onclick="addPerson()"
                    class="w-full bg-blue-600 text-white rounded-lg p-3 font-medium text-sm">
                    Add Person
                </button>
            </div>
        </div>

        <!-- People List -->
        <div id="peopleList" class="space-y-3"></div>

    </div>

    <!-- Balance Modal -->
    <div id="balanceModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-end justify-center">
        <div class="bg-white rounded-t-2xl p-6 w-full max-w-lg">
            <h3 class="font-bold text-lg mb-4" id="modalName"></h3>
            <div id="modalContent" class="space-y-3"></div>
            <button onclick="closeModal()"
                class="w-full mt-4 bg-gray-100 text-gray-700 rounded-lg p-3 font-medium">Close</button>
        </div>
    </div>

    <script>
        const API = 'https://expense-tracker-production-8665.up.railway.app';

        async function addPerson() {
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            if (!name || !email) { alert('Fill in name and email'); return; }

            await fetch(`${API}/api/people`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, email })
            });

            document.getElementById('name').value = '';
            document.getElementById('email').value = '';
            loadPeople();
        }

        async function loadPeople() {
            const res = await fetch(`${API}/api/people`);
            const people = await res.json();
            const list = document.getElementById('peopleList');

            list.innerHTML = people.map(p => `
                <div class="bg-white rounded-xl shadow p-4 flex justify-between items-center">
                    <div>
                        <p class="font-medium text-gray-800">${p.name}</p>
                        <p class="text-sm text-gray-500">${p.email}</p>
                    </div>
                    <button onclick="viewBalance(${p.id}, '${p.name}')"
                        class="bg-purple-600 text-white text-sm px-4 py-2 rounded-lg">
                        Balance
                    </button>
                </div>
            `).join('');
        }

        async function viewBalance(id, name) {
            const res = await fetch(`${API}/api/people/${id}/balance`);
            const text = await res.text();

            document.getElementById('modalName').textContent = name + "'s Balance";
            document.getElementById('modalContent').innerHTML = `
                <p class="text-gray-700 text-sm leading-relaxed">${text}</p>
            `;
            document.getElementById('balanceModal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('balanceModal').classList.add('hidden');
        }

        loadPeople();
    </script>

</body>
</html>
