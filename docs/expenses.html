<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expenses</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="bg-blue-600 text-white p-4">
        <h1 class="text-xl font-bold">💰 Expense Tracker</h1>
    </div>
    <div class="bg-white shadow-sm flex overflow-x-auto">
        <a href="index.html" class="px-4 py-3 text-gray-600 text-sm whitespace-nowrap">Dashboard</a>
        <a href="expenses.html" class="px-4 py-3 text-blue-600 border-b-2 border-blue-600 font-medium text-sm whitespace-nowrap">Expenses</a>
        <a href="people.html" class="px-4 py-3 text-gray-600 text-sm whitespace-nowrap">People</a>
        <a href="budget.html" class="px-4 py-3 text-gray-600 text-sm whitespace-nowrap">Budget</a>
        <a href="month-end.html" class="px-4 py-3 text-gray-600 text-sm whitespace-nowrap">Month End</a>
    </div>
    <div class="p-4 space-y-4">
        <div class="bg-white rounded-xl shadow p-4">
            <h2 class="font-bold text-gray-700 mb-3">Add Expense</h2>
            <div class="space-y-2">
                <input id="description" type="text" placeholder="Description *"
                    class="w-full border border-gray-300 rounded-lg p-3 text-sm focus:outline-none focus:border-blue-500">
                <input id="amount" type="number" placeholder="Amount ₹ *"
                    class="w-full border border-gray-300 rounded-lg p-3 text-sm focus:outline-none focus:border-blue-500">
                <select id="category" class="w-full border border-gray-300 rounded-lg p-3 text-sm focus:outline-none focus:border-blue-500">
                    <option value="">Select Category *</option>
                    <option value="FOOD">🍽 Food</option>
                    <option value="SPORTS">⚽ Sports</option>
                    <option value="VEHICLE">🚗 Vehicle</option>
                    <option value="TRIP">✈️ Trip</option>
                    <option value="ONLINE_SHOPPING">🛍 Online Shopping</option>
                    <option value="SUBSCRIPTIONS">📱 Subscriptions</option>
                    <option value="MISCELLANEOUS">📦 Miscellaneous</option>
                    <option value="GENERAL">💼 General</option>
                </select>
                <div>
                    <p class="text-xs text-gray-400 mb-1 ml-1">Date of Spending *</p>
                    <input id="spendingDate" type="date"
                        class="w-full border border-gray-300 rounded-lg p-3 text-sm focus:outline-none focus:border-blue-500">
                </div>
                <div>
                    <p class="text-xs text-gray-400 mb-1 ml-1">Settlement Deadline (optional)</p>
                    <input id="deadline" type="date"
                        class="w-full border border-gray-300 rounded-lg p-3 text-sm focus:outline-none focus:border-blue-500">
                </div>
                <input id="paidByName" type="text" placeholder="Paid By - Name (optional)"
                    class="w-full border border-gray-300 rounded-lg p-3 text-sm focus:outline-none focus:border-blue-500">
                <input id="owedByName" type="text" placeholder="Owed By - Name (optional)"
                    class="w-full border border-gray-300 rounded-lg p-3 text-sm focus:outline-none focus:border-blue-500">
                <div class="flex items-center gap-3 p-3 bg-gray-50 rounded-lg">
                    <input id="isCash" type="checkbox" class="w-4 h-4">
                    <label for="isCash" class="text-sm text-gray-700">💵 Paid by Cash</label>
                </div>
                <div id="warningBox" class="hidden bg-yellow-50 border border-yellow-300 text-yellow-800 rounded-lg p-3 text-sm"></div>
                <button onclick="addExpense()"
                    class="w-full bg-blue-600 text-white rounded-lg p-3 font-medium text-sm">
                    Add Expense
                </button>
            </div>
        </div>
        <div class="bg-white rounded-xl shadow p-4">
            <div class="flex gap-2">
                <button onclick="loadExpenses('all')" id="btn-all"
                    class="flex-1 py-2 px-3 rounded-lg text-sm font-medium bg-blue-600 text-white">All</button>
                <button onclick="loadExpenses('unsettled')" id="btn-unsettled"
                    class="flex-1 py-2 px-3 rounded-lg text-sm font-medium bg-gray-100 text-gray-600">Unsettled</button>
                <button onclick="loadExpenses('overdue')" id="btn-overdue"
                    class="flex-1 py-2 px-3 rounded-lg text-sm font-medium bg-gray-100 text-gray-600">Overdue</button>
            </div>
        </div>
        <div id="expenseList" class="space-y-3"></div>
    </div>
    <script>
        const API = 'https://expense-tracker-production-8665.up.railway.app';
        const OWNER = 'mani';

        async function addExpense() {
            const description = document.getElementById('description').value.trim();
            const amount = document.getElementById('amount').value;
            const category = document.getElementById('category').value;
            const spendingDate = document.getElementById('spendingDate').value;
            const deadline = document.getElementById('deadline').value;
            const paidByName = document.getElementById('paidByName').value.trim();
            const owedByName = document.getElementById('owedByName').value.trim();
            const isCash = document.getElementById('isCash').checked;

            if (!description || !amount || !category || !spendingDate) {
                alert('Please fill in description, amount, category and date of spending');
                return;
            }

            const expenseData = {
                description,
                amount: parseFloat(amount),
                category,
                spendingDate,
                settled: false,
                cash: isCash
            };

            if (deadline) expenseData.deadline = deadline;
            if (paidByName) expenseData.paidByName = paidByName;
            if (owedByName) expenseData.owedByName = owedByName;

            try {
                const res = await fetch(`${API}/api/budget/expense`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(expenseData)
                });
                if (!res.ok) {
                    const err = await res.json();
                    alert('Error: ' + (err.message || 'Failed to add expense'));
                    return;
                }
                const data = await res.json();
                if (data.warning) {
                    const box = document.getElementById('warningBox');
                    box.textContent = '⚠️ ' + data.warning;
                    box.classList.remove('hidden');
                } else {
                    document.getElementById('warningBox').classList.add('hidden');
                }
                document.getElementById('description').value = '';
                document.getElementById('amount').value = '';
                document.getElementById('category').value = '';
                document.getElementById('spendingDate').value = '';
                document.getElementById('deadline').value = '';
                document.getElementById('paidByName').value = '';
                document.getElementById('owedByName').value = '';
                document.getElementById('isCash').checked = false;
                loadExpenses('all');
            } catch (err) {
                alert('Error: ' + err.message);
            }
        }

        async function loadExpenses(filter = 'all') {
            ['all', 'unsettled', 'overdue'].forEach(f => {
                document.getElementById(`btn-${f}`).className =
                    'flex-1 py-2 px-3 rounded-lg text-sm font-medium ' +
                    (f === filter ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-600');
            });

            const res = await fetch(`${API}/api/expenses`);
            let expenses = await res.json();
            const today = new Date();
            today.setHours(0, 0, 0, 0);

            if (filter === 'unsettled') {
                expenses = expenses.filter(e =>
                    !e.settled && e.deadline && (e.owedBy || e.owedByName));
            } else if (filter === 'overdue') {
                expenses = expenses.filter(e => {
                    if (!e.deadline || e.settled) return false;
                    return new Date(e.deadline) < today;
                });
            }

            const list = document.getElementById('expenseList');
            if (expenses.length === 0) {
                list.innerHTML = '<div class="bg-white rounded-xl shadow p-6 text-center text-gray-400">No expenses found</div>';
                return;
            }

            list.innerHTML = expenses.map(e => {
                const owedName = e.owedBy ? e.owedBy.name : (e.owedByName || '');
                const paidName = e.paidBy ? e.paidBy.name : (e.paidByName || '');
                const hasSettlement = e.deadline && (e.owedBy || e.owedByName);
                const maniOwes = owedName.toLowerCase() === OWNER;
                const settleLabel = maniOwes ? '💸 Pay Back' : '✅ Collect';
                const settleBtnColor = maniOwes ? 'bg-orange-500' : 'bg-green-500';

                return `
                <div class="bg-white rounded-xl shadow p-4">
                    <div class="flex justify-between items-start">
                        <div class="flex-1">
                            <p class="font-medium text-gray-800">${e.description}</p>
                            <p class="text-2xl font-bold text-blue-600 mt-1">₹${e.amount}</p>
                            <div class="flex gap-2 mt-2 flex-wrap">
                                <span class="bg-blue-100 text-blue-700 text-xs px-2 py-1 rounded-full">${e.category}</span>
                                ${e.cash ? `<span class="bg-yellow-100 text-yellow-700 text-xs px-2 py-1 rounded-full">💵 Cash</span>` : ''}
                                ${e.settled ?
                                    `<span class="bg-green-100 text-green-700 text-xs px-2 py-1 rounded-full">✅ Settled</span>` :
                                    hasSettlement ?
                                    `<span class="bg-red-100 text-red-700 text-xs px-2 py-1 rounded-full">⏳ Pending</span>` : ''
                                }
                            </div>
                            ${paidName ? `<p class="text-xs text-gray-500 mt-1">Paid by: ${paidName}</p>` : ''}
                            ${owedName ? `<p class="text-xs text-gray-500">Owed by: ${owedName}</p>` : ''}
                            ${e.spendingDate ? `<p class="text-xs text-gray-400 mt-1">Spent on: ${e.spendingDate}</p>` : ''}
                            ${e.deadline ? `<p class="text-xs text-gray-400">Due: ${e.deadline}</p>` : ''}
                        </div>
                        <div class="flex flex-col gap-2 ml-3">
                            ${!e.settled && hasSettlement ?
                                `<button onclick="settle(${e.id})"
                                    class="${settleBtnColor} text-white text-xs px-3 py-2 rounded-lg">
                                    ${settleLabel}
                                </button>` : ''}
                            <button onclick="deleteExpense(${e.id})"
                                class="bg-red-500 text-white text-xs px-3 py-2 rounded-lg">Delete</button>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        async function settle(id) {
            await fetch(`${API}/api/expenses/${id}/settle`, { method: 'PUT' });
            loadExpenses('all');
        }

        async function deleteExpense(id) {
            if (!confirm('Delete this expense?')) return;
            await fetch(`${API}/api/expenses/${id}`, { method: 'DELETE' });
            loadExpenses('all');
        }

        loadExpenses('all');
    </script>
</body>
</html>
