<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budget</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="bg-blue-600 text-white p-4">
        <h1 class="text-xl font-bold">💰 Expense Tracker</h1>
    </div>
    <div class="bg-white shadow-sm flex overflow-x-auto">
        <a href="index.html" class="px-4 py-3 text-gray-600 text-sm whitespace-nowrap">Dashboard</a>
        <a href="expenses.html" class="px-4 py-3 text-gray-600 text-sm whitespace-nowrap">Expenses</a>
        <a href="people.html" class="px-4 py-3 text-gray-600 text-sm whitespace-nowrap">People</a>
        <a href="budget.html" class="px-4 py-3 text-blue-600 border-b-2 border-blue-600 font-medium text-sm whitespace-nowrap">Budget</a>
        <a href="month-end.html" class="px-4 py-3 text-gray-600 text-sm whitespace-nowrap">Month End</a>
    </div>
    <div class="p-4 space-y-4">

        <div id="budgetStatus" class="bg-white rounded-xl shadow p-4">
            <p class="text-gray-400 text-sm">Loading...</p>
        </div>

        <!-- Financial Profile -->
        <div class="bg-white rounded-xl shadow p-4">
            <div class="flex justify-between items-center mb-3">
                <h2 class="font-bold text-gray-700">Financial Profile</h2>
                <button onclick="resetProfile()"
                    class="text-xs text-red-500 border border-red-300 px-3 py-1 rounded-lg">Reset</button>
            </div>
            <p class="text-xs text-gray-400 mb-3">Fill all fields to setup or update. Leave blank to keep existing.</p>
            <div class="space-y-3">
                <input id="accountBalance" type="number" placeholder="Account Balance (₹)"
                    class="w-full border border-gray-300 rounded-lg p-3 text-sm focus:outline-none focus:border-blue-500">
                <input id="cashBalance" type="number" placeholder="Cash in Hand (₹)"
                    class="w-full border border-gray-300 rounded-lg p-3 text-sm focus:outline-none focus:border-blue-500">
                <input id="salaryAmount" type="number" placeholder="Monthly Salary (₹)"
                    class="w-full border border-gray-300 rounded-lg p-3 text-sm focus:outline-none focus:border-blue-500">
                <input id="savingsAmount" type="number" placeholder="Current Savings (₹)"
                    class="w-full border border-gray-300 rounded-lg p-3 text-sm focus:outline-none focus:border-blue-500">
                <button onclick="saveProfile()"
                    class="w-full bg-blue-600 text-white rounded-lg p-3 font-medium text-sm">
                    Save Profile
                </button>
            </div>
        </div>

        <!-- Monthly Budget -->
        <div class="bg-white rounded-xl shadow p-4">
            <div class="flex justify-between items-center mb-3">
                <h2 class="font-bold text-gray-700">Monthly Budget</h2>
                <button onclick="resetBudget()"
                    class="text-xs text-red-500 border border-red-300 px-3 py-1 rounded-lg">Reset</button>
            </div>
            <p class="text-xs text-gray-400 mb-3">Set or update this month's allowances.</p>
            <div class="space-y-3">
                <input id="totalAllowance" type="number" placeholder="General Allowance (₹)"
                    class="w-full border border-gray-300 rounded-lg p-3 text-sm focus:outline-none focus:border-blue-500">
                <input id="vehicleAllowance" type="number" placeholder="Vehicle Allowance (₹)"
                    class="w-full border border-gray-300 rounded-lg p-3 text-sm focus:outline-none focus:border-blue-500">
                <button onclick="saveBudget()"
                    class="w-full bg-green-600 text-white rounded-lg p-3 font-medium text-sm">
                    Save Budget
                </button>
            </div>
        </div>

    </div>
    <script>
        const API = 'https://expense-tracker-production-8665.up.railway.app';

        async function loadBudgetStatus() {
            try {
                const [summaryRes, budgetRes] = await Promise.all([
                    fetch(`${API}/api/budget/summary`),
                    fetch(`${API}/api/budget/monthly/current`)
                ]);
                if (!summaryRes.ok) throw new Error();
                const d = await summaryRes.json();
                let budgetHtml = '';
                if (budgetRes.ok) {
                    const b = await budgetRes.json();
                    const aSpent = (parseFloat(b.totalAllowance) - parseFloat(d.remainingAllowance)).toFixed(2);
                    const vSpent = (parseFloat(b.vehicleAllowance) - parseFloat(d.remainingVehicleAllowance)).toFixed(2);
                    budgetHtml = `
                        <div class="bg-blue-50 rounded-lg p-3">
                            <p class="text-xs text-gray-500">General Allowance</p>
                            <p class="font-bold text-blue-600 text-sm">₹${b.totalAllowance} - ₹${aSpent} : ₹${d.remainingAllowance}</p>
                        </div>
                        <div class="bg-orange-50 rounded-lg p-3">
                            <p class="text-xs text-gray-500">Vehicle Allowance</p>
                            <p class="font-bold text-orange-600 text-sm">₹${b.vehicleAllowance} - ₹${vSpent} : ₹${d.remainingVehicleAllowance}</p>
                        </div>`;
                }
                document.getElementById('budgetStatus').innerHTML = `
                    <h2 class="font-bold text-gray-700 mb-3">Current Status</h2>
                    <div class="grid grid-cols-2 gap-3">
                        <div class="bg-blue-50 rounded-lg p-3">
                            <p class="text-xs text-gray-500">Account Balance</p>
                            <p class="font-bold text-blue-600">₹${d.accountBalance}</p>
                        </div>
                        <div class="bg-yellow-50 rounded-lg p-3">
                            <p class="text-xs text-gray-500">Cash in Hand</p>
                            <p class="font-bold text-yellow-600">₹${d.cashBalance}</p>
                        </div>
                        <div class="bg-green-50 rounded-lg p-3">
                            <p class="text-xs text-gray-500">Savings</p>
                            <p class="font-bold text-green-600">₹${d.savingsAmount}</p>
                        </div>
                        <div class="bg-purple-50 rounded-lg p-3">
                            <p class="text-xs text-gray-500">Remaining Salary</p>
                            <p class="font-bold text-purple-600">₹${d.remainingSalary}</p>
                        </div>
                        ${budgetHtml}
                    </div>`;
            } catch {
                document.getElementById('budgetStatus').innerHTML =
                    '<p class="text-gray-400 text-sm">No profile set up yet. Use the form below.</p>';
            }
        }

        async function saveProfile() {
            const a = document.getElementById('accountBalance').value;
            const c = document.getElementById('cashBalance').value;
            const s = document.getElementById('salaryAmount').value;
            const sav = document.getElementById('savingsAmount').value;

            // Check if profile exists
            const checkRes = await fetch(`${API}/api/budget/profile`);

            if (!checkRes.ok) {
                // Setup new profile
                if (!a || !c || !s) { alert('Fill account balance, cash and salary to setup'); return; }
                const res = await fetch(`${API}/api/budget/profile/setup`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        accountBalance: parseFloat(a),
                        cashBalance: parseFloat(c),
                        salaryAmount: parseFloat(s),
                        initialSavings: sav ? parseFloat(sav) : 0
                    })
                });
                if (res.ok) { alert('Profile created!'); clearProfileFields(); loadBudgetStatus(); }
                else { const e = await res.json(); alert(e.message || 'Error'); }
            } else {
                // Update existing
                const body = {};
                if (a) body.accountBalance = parseFloat(a);
                if (c) body.cashBalance = parseFloat(c);
                if (s) body.salaryAmount = parseFloat(s);
                if (sav) body.savingsAmount = parseFloat(sav);
                if (Object.keys(body).length === 0) { alert('Fill at least one field'); return; }
                const res = await fetch(`${API}/api/budget/profile/update`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                if (res.ok) { alert('Profile updated!'); clearProfileFields(); loadBudgetStatus(); }
                else { const e = await res.json(); alert(e.message || 'Error'); }
            }
        }

        async function saveBudget() {
            const t = document.getElementById('totalAllowance').value;
            const v = document.getElementById('vehicleAllowance').value;
            if (!t || !v) { alert('Fill both allowance fields'); return; }

            const checkRes = await fetch(`${API}/api/budget/monthly/current`);

            if (!checkRes.ok) {
                // Create new budget
                const res = await fetch(`${API}/api/budget/monthly`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        totalAllowance: parseFloat(t),
                        vehicleAllowance: parseFloat(v)
                    })
                });
                if (res.ok) { alert('Budget created!'); clearBudgetFields(); loadBudgetStatus(); }
                else { const e = await res.json(); alert(e.message || 'Error'); }
            } else {
                // Update existing
                const res = await fetch(`${API}/api/budget/monthly/update`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        totalAllowance: parseFloat(t),
                        vehicleAllowance: parseFloat(v)
                    })
                });
                if (res.ok) { alert('Budget updated!'); clearBudgetFields(); loadBudgetStatus(); }
                else { const e = await res.json(); alert(e.message || 'Error'); }
            }
        }

        async function resetProfile() {
            if (!confirm('Reset financial profile? This deletes your profile but keeps expenses.')) return;
            await fetch(`${API}/api/budget/profile/reset`, { method: 'DELETE' });
            alert('Profile reset. Set up a new one below.');
            loadBudgetStatus();
        }

        async function resetBudget() {
            if (!confirm('Reset this month\'s budget? This cannot be undone.')) return;
            await fetch(`${API}/api/budget/monthly/reset`, { method: 'DELETE' });
            alert('Budget reset. Create a new one below.');
            loadBudgetStatus();
        }

        function clearProfileFields() {
            ['accountBalance','cashBalance','salaryAmount','savingsAmount']
                .forEach(id => document.getElementById(id).value = '');
        }

        function clearBudgetFields() {
            ['totalAllowance','vehicleAllowance']
                .forEach(id => document.getElementById(id).value = '');
        }

        loadBudgetStatus();
    </script>
</body>
</html>
