<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budget · SpendSmart</title>
    <script src="https://cdn.tailwindcss.com"></script>
	<link rel="manifest" href="manifest.json">
	<meta name="theme-color" content="#667eea">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background:#f0f4f8; }
        .card { background:white; border-radius:16px; padding:20px; box-shadow:0 2px 12px rgba(0,0,0,0.08); margin-bottom:16px; }
        .input { width:100%; border:1.5px solid #e5e7eb; border-radius:10px; padding:12px; font-size:14px; outline:none; transition:border 0.2s; box-sizing:border-box; }
        .input:focus { border-color:#667eea; }
        .btn { width:100%; border:none; border-radius:10px; padding:13px; font-size:14px; font-weight:600; cursor:pointer; }
        .stat-box { background:#f9fafb; border-radius:12px; padding:14px; }
    </style>
</head>
<body>
    <div style="background:linear-gradient(135deg,#f7971e,#ffd200);color:white;padding:48px 20px 20px;">
        <h1 style="font-size:22px;font-weight:700;color:#1f2937;">Budget & Profile</h1>
    </div>

    <div style="padding:16px;padding-bottom:100px;max-width:480px;margin:0 auto;">

        <!-- Status Card -->
        <div class="card" id="statusCard">
            <p style="color:#9ca3af;font-size:14px;">Loading status...</p>
        </div>

        <!-- Financial Profile -->
        <div class="card">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
                <h2 style="font-size:16px;font-weight:700;color:#1f2937;">Financial Profile</h2>
                <button onclick="resetProfile()" style="font-size:12px;color:#ef4444;border:1px solid #fca5a5;border-radius:8px;padding:4px 12px;background:white;cursor:pointer;">Reset</button>
            </div>
            <p style="font-size:12px;color:#9ca3af;margin-bottom:16px;">Auto-detects if profile exists. Fill only what you want to update.</p>
            <div style="display:flex;flex-direction:column;gap:10px;">
                <input id="accountBalance" class="input" type="number" placeholder="Bank Balance (₹)">
                <input id="cashBalance" class="input" type="number" placeholder="Cash in Hand (₹)">
                <input id="salaryAmount" class="input" type="number" placeholder="Monthly Salary (₹)">
                <input id="savingsAmount" class="input" type="number" placeholder="Current Savings (₹)">
                <button class="btn" onclick="saveProfile()" style="background:linear-gradient(135deg,#667eea,#764ba2);color:white;">Save Profile</button>
            </div>
        </div>

        <!-- Monthly Budget -->
        <div class="card">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
                <h2 style="font-size:16px;font-weight:700;color:#1f2937;">Monthly Budget</h2>
                <button onclick="resetBudget()" style="font-size:12px;color:#ef4444;border:1px solid #fca5a5;border-radius:8px;padding:4px 12px;background:white;cursor:pointer;">Reset</button>
            </div>
            <p style="font-size:12px;color:#9ca3af;margin-bottom:16px;">Auto-detects if budget exists. Creates new or updates existing.</p>
            <div style="display:flex;flex-direction:column;gap:10px;">
                <input id="totalAllowance" class="input" type="number" placeholder="General Allowance (₹)">
                <input id="vehicleAllowance" class="input" type="number" placeholder="Vehicle Allowance (₹)">
                <button class="btn" onclick="saveBudget()" style="background:linear-gradient(135deg,#11998e,#38ef7d);color:white;">Save Budget</button>
            </div>
        </div>

    </div>

    <!-- Bottom Nav -->
    <div style="position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid #e5e7eb;padding:12px 0;display:flex;justify-content:space-around;align-items:center;">
        <a href="index.html" style="display:flex;flex-direction:column;align-items:center;color:#9ca3af;text-decoration:none;font-size:11px;"><span style="font-size:22px">🏠</span>Home</a>
        <a href="expenses.html" style="display:flex;flex-direction:column;align-items:center;color:#9ca3af;text-decoration:none;font-size:11px;"><span style="font-size:22px">💸</span>Expenses</a>
        <a href="people.html" style="display:flex;flex-direction:column;align-items:center;color:#9ca3af;text-decoration:none;font-size:11px;"><span style="font-size:22px">👥</span>People</a>
        <a href="budget.html" style="display:flex;flex-direction:column;align-items:center;color:#f7971e;text-decoration:none;font-size:11px;font-weight:600;"><span style="font-size:22px">📊</span>Budget</a>
        <a href="month-end.html" style="display:flex;flex-direction:column;align-items:center;color:#9ca3af;text-decoration:none;font-size:11px;"><span style="font-size:22px">📅</span>Month End</a>
    </div>

    <script>
        const API = 'https://expense-tracker-production-8665.up.railway.app';

        function fmt(v) {
            return parseFloat(v).toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2});
        }

        async function loadStatus() {
            const card = document.getElementById('statusCard');
            try {
                const [sr, br] = await Promise.all([
                    fetch(`${API}/api/budget/summary`),
                    fetch(`${API}/api/budget/monthly/current`)
                ]);
                if (!sr.ok) { card.innerHTML = '<p style="color:#9ca3af;font-size:14px;">No profile yet. Set one up below.</p>'; return; }
                const d = await sr.json();

                let budgetHtml = '<p style="color:#9ca3af;font-size:13px;margin-top:8px;">No budget for this month yet.</p>';
                if (br.ok) {
                    const b = await br.json();
                    const aSpent = (parseFloat(b.totalAllowance) - parseFloat(d.remainingAllowance)).toFixed(0);
                    const vSpent = (parseFloat(b.vehicleAllowance) - parseFloat(d.remainingVehicleAllowance)).toFixed(0);
                    budgetHtml = `
                        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px;">
                            <div class="stat-box">
                                <p style="font-size:11px;color:#9ca3af;font-weight:600;">GENERAL</p>
                                <p style="font-size:15px;font-weight:700;color:#2563eb;">₹${fmt(d.remainingAllowance)}</p>
                                <p style="font-size:11px;color:#9ca3af;">₹${aSpent} used of ₹${fmt(b.totalAllowance)}</p>
                            </div>
                            <div class="stat-box">
                                <p style="font-size:11px;color:#9ca3af;font-weight:600;">VEHICLE</p>
                                <p style="font-size:15px;font-weight:700;color:#ea580c;">₹${fmt(d.remainingVehicleAllowance)}</p>
                                <p style="font-size:11px;color:#9ca3af;">₹${vSpent} used of ₹${fmt(b.vehicleAllowance)}</p>
                            </div>
                        </div>`;
                }

                card.innerHTML = `
                    <h2 style="font-size:16px;font-weight:700;color:#1f2937;margin-bottom:12px;">Current Status</h2>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
                        <div class="stat-box">
                            <p style="font-size:11px;color:#9ca3af;font-weight:600;">BANK BALANCE</p>
                            <p style="font-size:16px;font-weight:700;color:#667eea;">₹${fmt(d.accountBalance)}</p>
                        </div>
                        <div class="stat-box">
                            <p style="font-size:11px;color:#9ca3af;font-weight:600;">CASH IN HAND</p>
                            <p style="font-size:16px;font-weight:700;color:#d97706;">₹${fmt(d.cashBalance)}</p>
                        </div>
                        <div class="stat-box">
                            <p style="font-size:11px;color:#9ca3af;font-weight:600;">SAVINGS</p>
                            <p style="font-size:16px;font-weight:700;color:#16a34a;">₹${fmt(d.savingsAmount)}</p>
                        </div>
                        <div class="stat-box">
                            <p style="font-size:11px;color:#9ca3af;font-weight:600;">SALARY LEFT</p>
                            <p style="font-size:16px;font-weight:700;color:#7c3aed;">₹${fmt(d.remainingSalary)}</p>
                            <p style="font-size:11px;color:#9ca3af;">of ₹${fmt(d.salaryAmount)}</p>
                        </div>
                    </div>
                    ${budgetHtml}`;
            } catch(e) {
                card.innerHTML = '<p style="color:#ef4444;font-size:14px;">Error loading status</p>';
            }
        }

        async function saveProfile() {
            const a = document.getElementById('accountBalance').value;
            const c = document.getElementById('cashBalance').value;
            const s = document.getElementById('salaryAmount').value;
            const sav = document.getElementById('savingsAmount').value;

            const checkRes = await fetch(`${API}/api/budget/profile`);

            if (!checkRes.ok) {
                if (!a || !c || !s) { alert('Bank balance, cash balance and salary are required for first setup.'); return; }
                const res = await fetch(`${API}/api/budget/profile/setup`, {
                    method:'POST', headers:{'Content-Type':'application/json'},
                    body: JSON.stringify({
                        accountBalance: parseFloat(a), cashBalance: parseFloat(c),
                        salaryAmount: parseFloat(s), initialSavings: sav ? parseFloat(sav) : 0
                    })
                });
                if (res.ok) { alert('Profile created!'); clearProfile(); loadStatus(); }
                else { const e = await res.json(); alert(e.message || 'Error'); }
            } else {
                const body = {};
                if (a) body.accountBalance = parseFloat(a);
                if (c) body.cashBalance = parseFloat(c);
                if (s) body.salaryAmount = parseFloat(s);
                if (sav) body.savingsAmount = parseFloat(sav);
                if (!Object.keys(body).length) { alert('Fill at least one field to update.'); return; }
                const res = await fetch(`${API}/api/budget/profile/update`, {
                    method:'PUT', headers:{'Content-Type':'application/json'},
                    body: JSON.stringify(body)
                });
                if (res.ok) { alert('Profile updated!'); clearProfile(); loadStatus(); }
                else { const e = await res.json(); alert(e.message || 'Error'); }
            }
        }

        async function saveBudget() {
            const t = document.getElementById('totalAllowance').value;
            const v = document.getElementById('vehicleAllowance').value;
            if (!t || !v) { alert('Fill both allowance fields.'); return; }

            const checkRes = await fetch(`${API}/api/budget/monthly/current`);

            if (!checkRes.ok) {
                const res = await fetch(`${API}/api/budget/monthly`, {
                    method:'POST', headers:{'Content-Type':'application/json'},
                    body: JSON.stringify({totalAllowance: parseFloat(t), vehicleAllowance: parseFloat(v)})
                });
                if (res.ok) { alert('Budget created!'); clearBudget(); loadStatus(); }
                else { const e = await res.json(); alert(e.message || 'Error'); }
            } else {
                const res = await fetch(`${API}/api/budget/monthly/update`, {
                    method:'PUT', headers:{'Content-Type':'application/json'},
                    body: JSON.stringify({totalAllowance: parseFloat(t), vehicleAllowance: parseFloat(v)})
                });
                if (res.ok) { alert('Budget updated!'); clearBudget(); loadStatus(); }
                else { const e = await res.json(); alert(e.message || 'Error'); }
            }
        }

        async function resetProfile() {
            if (!confirm('Reset financial profile? Expenses and people will be kept.')) return;
            const res = await fetch(`${API}/api/budget/profile/reset`, {method:'DELETE'});
            if (res.ok) { alert('Profile reset.'); clearProfile(); loadStatus(); }
            else alert('Error resetting profile');
        }

        async function resetBudget() {
            if (!confirm('Reset this month\'s budget?')) return;
            const res = await fetch(`${API}/api/budget/monthly/reset`, {method:'DELETE'});
            if (res.ok) { alert('Budget reset.'); clearBudget(); loadStatus(); }
            else alert('Error resetting budget');
        }

        function clearProfile() {
            ['accountBalance','cashBalance','salaryAmount','savingsAmount'].forEach(id => document.getElementById(id).value = '');
        }
        function clearBudget() {
            ['totalAllowance','vehicleAllowance'].forEach(id => document.getElementById(id).value = '');
        }

        loadStatus();
    </script>
	<script>
	    if ('serviceWorker' in navigator) {
	        navigator.serviceWorker.register('/expense-tracker/sw.js')
	            .then(() => console.log('SW registered'))
	            .catch(e => console.log('SW error:', e));
	    }
	</script>
</body>
</html>
