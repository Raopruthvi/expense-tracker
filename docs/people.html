<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>People</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="bg-blue-600 text-white p-4">
        <h1 class="text-xl font-bold">💰 Expense Tracker</h1>
    </div>
    <div class="bg-white shadow-sm flex overflow-x-auto">
        <a href="index.html" class="px-4 py-3 text-gray-600 text-sm whitespace-nowrap">Dashboard</a>
        <a href="expenses.html" class="px-4 py-3 text-gray-600 text-sm whitespace-nowrap">Expenses</a>
        <a href="people.html" class="px-4 py-3 text-blue-600 border-b-2 border-blue-600 font-medium text-sm whitespace-nowrap">People</a>
        <a href="budget.html" class="px-4 py-3 text-gray-600 text-sm whitespace-nowrap">Budget</a>
        <a href="month-end.html" class="px-4 py-3 text-gray-600 text-sm whitespace-nowrap">Month End</a>
    </div>
    <div class="p-4 space-y-4">
        <div id="peopleList" class="space-y-3">
            <div class="bg-white rounded-xl shadow p-6 text-center text-gray-400">Loading...</div>
        </div>
    </div>

    <!-- Detail Modal -->
    <div id="modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-end justify-center z-50">
        <div class="bg-white rounded-t-2xl p-6 w-full max-w-lg max-h-96 overflow-y-auto">
            <h3 class="font-bold text-lg mb-4" id="modalName"></h3>
            <div id="modalContent" class="space-y-3"></div>
            <button onclick="closeModal()"
                class="w-full mt-4 bg-gray-100 text-gray-700 rounded-lg p-3 font-medium">Close</button>
        </div>
    </div>

    <script>
        const API = 'https://expense-tracker-production-8665.up.railway.app';

        async function loadPeople() {
            const [peopleRes, expensesRes] = await Promise.all([
                fetch(`${API}/api/people`),
                fetch(`${API}/api/expenses`)
            ]);
            const people = await peopleRes.json();
            const expenses = await expensesRes.json();
            const list = document.getElementById('peopleList');

            const unsettled = expenses.filter(e => !e.isSettled);

            // Build per-person summary
            const summaries = people.map(p => {
                const owesMe = expenses.filter(e =>
                    !e.settled &&
                    e.paidBy && e.paidBy.id === p.id &&
                    e.owedBy && e.owedBy.name !== (e.paidBy ? e.paidBy.name : '')
                );
                const iOwe = expenses.filter(e =>
                    !e.settled &&
                    e.owedBy && e.owedBy.id === p.id
                );

                // Expenses involving this person
                const relevant = expenses.filter(e =>
                    !e.settled && (
                        (e.paidBy && e.paidBy.id === p.id) ||
                        (e.owedBy && e.owedBy.id === p.id)
                    )
                );

                return { person: p, expenses: relevant };
            }).filter(s => s.expenses.length > 0);

            if (summaries.length === 0) {
                list.innerHTML = '<div class="bg-white rounded-xl shadow p-6 text-center text-gray-400">No pending balances 🎉</div>';
                return;
            }

            list.innerHTML = summaries.map(s => {
                const p = s.person;
                const owesToMani = s.expenses
                    .filter(e => e.owedBy && e.owedBy.id === p.id)
                    .reduce((sum, e) => sum + parseFloat(e.amount), 0);
                const maniOwes = s.expenses
                    .filter(e => e.paidBy && e.paidBy.id === p.id)
                    .reduce((sum, e) => sum + parseFloat(e.amount), 0);

                return `
                <div class="bg-white rounded-xl shadow p-4" onclick="viewDetails(${p.id}, '${p.name}')">
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="font-bold text-gray-800 text-base">${p.name}</p>
                            ${owesToMani > 0 ? `<p class="text-sm text-green-600 mt-1">Owes you: ₹${owesToMani.toFixed(2)}</p>` : ''}
                            ${maniOwes > 0 ? `<p class="text-sm text-red-500 mt-1">You owe: ₹${maniOwes.toFixed(2)}</p>` : ''}
                        </div>
                        <span class="text-gray-400 text-sm">Tap for details →</span>
                    </div>
                    <div class="mt-2 space-y-1">
                        ${s.expenses.slice(0, 2).map(e => `
                            <p class="text-xs text-gray-500">
                                ${e.owedBy && e.owedBy.id === p.id ? '← Owes' : 'You owe →'}
                                ₹${e.amount} for ${e.description}
                            </p>
                        `).join('')}
                        ${s.expenses.length > 2 ? `<p class="text-xs text-gray-400">+${s.expenses.length - 2} more</p>` : ''}
                    </div>
                </div>`;
            }).join('');
        }

        async function viewDetails(id, name) {
            const res = await fetch(`${API}/api/people/${id}/expenses`);
            const expenses = await res.json();

            document.getElementById('modalName').textContent = name;
            document.getElementById('modalContent').innerHTML = expenses.length === 0 ?
                '<p class="text-gray-400 text-sm">No pending expenses</p>' :
                expenses.map(e => `
                    <div class="border-b pb-2">
                        <div class="flex justify-between">
                            <p class="text-sm font-medium text-gray-800">${e.description}</p>
                            <p class="text-sm font-bold text-blue-600">₹${e.amount}</p>
                        </div>
                        <p class="text-xs text-gray-500 mt-1">
                            ${e.owedBy === name ? 'Owes you' : 'You owe'} · ${e.category}
                            ${e.deadline ? ' · Due: ' + e.deadline : ''}
                        </p>
                    </div>
                `).join('');

            document.getElementById('modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
        }

        loadPeople();
    </script>
</body>
</html>
