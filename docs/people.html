<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>People · SpendSmart</title>
    <script src="https://cdn.tailwindcss.com"></script>
	<link rel="manifest" href="manifest.json">
	<meta name="theme-color" content="#667eea">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background:#f0f4f8; }
        .card { background:white; border-radius:16px; padding:20px; box-shadow:0 2px 12px rgba(0,0,0,0.08); margin-bottom:12px; }
    </style>
</head>
<body>
    <div style="background:linear-gradient(135deg,#11998e,#38ef7d);color:white;padding:48px 20px 20px;">
        <h1 style="font-size:22px;font-weight:700;">People</h1>
        <p style="font-size:13px;opacity:0.8;margin-top:4px;">Showing people with pending balances</p>
    </div>

    <div style="padding:16px;padding-bottom:100px;max-width:480px;margin:0 auto;">
        <div id="peopleList">
            <div class="card" style="text-align:center;color:#9ca3af;">Loading...</div>
        </div>
    </div>

    <!-- Modal -->
    <div id="modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:50;align-items:flex-end;justify-content:center;">
        <div style="background:white;border-radius:20px 20px 0 0;padding:24px;width:100%;max-width:480px;max-height:80vh;overflow-y:auto;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
                <h3 id="modalName" style="font-size:18px;font-weight:700;color:#1f2937;"></h3>
                <button onclick="closeModal()" style="padding:4px 12px;border-radius:8px;border:none;background:#f3f4f6;color:#6b7280;cursor:pointer;font-size:13px;">Close</button>
            </div>
            <div id="modalContent"></div>
        </div>
    </div>

    <!-- Bottom Nav -->
    <div style="position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid #e5e7eb;padding:12px 0;display:flex;justify-content:space-around;align-items:center;">
        <a href="index.html" style="display:flex;flex-direction:column;align-items:center;color:#9ca3af;text-decoration:none;font-size:11px;"><span style="font-size:22px">🏠</span>Home</a>
        <a href="expenses.html" style="display:flex;flex-direction:column;align-items:center;color:#9ca3af;text-decoration:none;font-size:11px;"><span style="font-size:22px">💸</span>Expenses</a>
        <a href="people.html" style="display:flex;flex-direction:column;align-items:center;color:#11998e;text-decoration:none;font-size:11px;font-weight:600;"><span style="font-size:22px">👥</span>People</a>
        <a href="budget.html" style="display:flex;flex-direction:column;align-items:center;color:#9ca3af;text-decoration:none;font-size:11px;"><span style="font-size:22px">📊</span>Budget</a>
        <a href="month-end.html" style="display:flex;flex-direction:column;align-items:center;color:#9ca3af;text-decoration:none;font-size:11px;"><span style="font-size:22px">📅</span>Month End</a>
    </div>

    <script>
        const API = 'https://expense-tracker-production-8665.up.railway.app';
        const OWNER = 'mani';

        function fmt(v) {
            return parseFloat(v).toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2});
        }

        async function loadPeople() {
            const [pr, er] = await Promise.all([
                fetch(`${API}/api/people`),
                fetch(`${API}/api/expenses`)
            ]);
            const people = await pr.json();
            const expenses = await er.json();
            const list = document.getElementById('peopleList');

            const unsettled = expenses.filter(e => !e.settled);

            const summaries = people.map(p => {
                const relevant = unsettled.filter(e =>
                    (e.paidBy && e.paidBy.id === p.id) ||
                    (e.owedBy && e.owedBy.id === p.id)
                );
                if (!relevant.length) return null;

                const theyOweMe = relevant.filter(e =>
                    e.owedBy && e.owedBy.id === p.id);
                const iOweThem = relevant.filter(e =>
                    e.paidBy && e.paidBy.id === p.id);

                const theyOweMeTotal = theyOweMe.reduce((s,e) => s + parseFloat(e.amount), 0);
                const iOweThemTotal = iOweThem.reduce((s,e) => s + parseFloat(e.amount), 0);

                return { person: p, theyOweMe, iOweThem, theyOweMeTotal, iOweThemTotal };
            }).filter(Boolean);

            if (!summaries.length) {
                list.innerHTML = '<div class="card" style="text-align:center;color:#9ca3af;padding:32px;">🎉 All settled up!</div>';
                return;
            }

            list.innerHTML = summaries.map(s => `
                <div class="card" onclick="openModal(${JSON.stringify(s).replace(/"/g,'&quot;')})" style="cursor:pointer;">
                    <div style="display:flex;justify-content:space-between;align-items:center;">
                        <div style="display:flex;align-items:center;gap:12px;">
                            <div style="width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:18px;">
                                ${s.person.name[0].toUpperCase()}
                            </div>
                            <div>
                                <p style="font-size:16px;font-weight:700;color:#1f2937;">${s.person.name}</p>
                                <p style="font-size:12px;color:#6b7280;margin-top:2px;">${s.theyOweMe.length + s.iOweThem.length} pending</p>
                            </div>
                        </div>
                        <div style="text-align:right;">
                            ${s.theyOweMeTotal > 0 ? `<p style="font-size:14px;font-weight:700;color:#16a34a;">+₹${fmt(s.theyOweMeTotal)}</p>` : ''}
                            ${s.iOweThemTotal > 0 ? `<p style="font-size:14px;font-weight:700;color:#dc2626;">-₹${fmt(s.iOweThemTotal)}</p>` : ''}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function openModal(s) {
            document.getElementById('modalName').textContent = s.person.name;
            let html = '';

            if (s.theyOweMe.length) {
                html += `<p style="font-size:13px;font-weight:700;color:#16a34a;margin-bottom:8px;">THEY OWE YOU</p>`;
                html += s.theyOweMe.map(e => `
                    <div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f3f4f6;">
                        <div>
                            <p style="font-size:14px;font-weight:600;color:#1f2937;">${e.description}</p>
                            <p style="font-size:12px;color:#9ca3af;">${e.category}${e.deadline ? ' · Due: ' + e.deadline : ''}</p>
                        </div>
                        <p style="font-size:15px;font-weight:700;color:#16a34a;">₹${fmt(e.amount)}</p>
                    </div>
                `).join('');
            }

            if (s.iOweThem.length) {
                html += `<p style="font-size:13px;font-weight:700;color:#dc2626;margin-top:16px;margin-bottom:8px;">YOU OWE THEM</p>`;
                html += s.iOweThem.map(e => `
                    <div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f3f4f6;">
                        <div>
                            <p style="font-size:14px;font-weight:600;color:#1f2937;">${e.description}</p>
                            <p style="font-size:12px;color:#9ca3af;">${e.category}${e.deadline ? ' · Due: ' + e.deadline : ''}</p>
                        </div>
                        <p style="font-size:15px;font-weight:700;color:#dc2626;">₹${fmt(e.amount)}</p>
                    </div>
                `).join('');
            }

            document.getElementById('modalContent').innerHTML = html;
            document.getElementById('modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        loadPeople();
    </script>
	<script>
	    if ('serviceWorker' in navigator) {
	        navigator.serviceWorker.register('/expense-tracker/sw.js')
	            .then(() => console.log('SW registered'))
	            .catch(e => console.log('SW error:', e));
	    }
	</script>
</body>
</html>
